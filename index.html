<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>720 ENT Hub</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#1f1f1f,#000);color:#fff;min-height:100vh;padding:20px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;max-width:1200px;margin:0 auto}
    .tool{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:16px;padding:24px;text-align:center;transition:all .3s}
    .tool:hover{background:rgba(255,255,255,.12);transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,.4)}
    .tool h3{margin:0 0 12px;font-size:20px}
    .tool p{color:#ccc;margin:0 0 20px;font-size:14px}
    .tool button{width:100%;padding:14px;border:0;border-radius:10px;background:#fff;color:#000;font-weight:700;cursor:pointer;font-size:16px}
    .badge{position:fixed;top:20px;right:20px;padding:8px 16px;background:rgba(0,0,0,.8);border:1px solid #fff;border-radius:20px;font-size:12px;font-weight:700}
  </style>
</head>
<body>
  <div class="badge">720 ENT</div>
  
  <div class="grid">
    <div class="tool">
      <h3>Quick Tools</h3>
      <p>One-click utilities</p>
      <button onclick="launchColorPicker()">Color Picker</button>
    </div>
    
    <div class="tool">
      <h3>Inspect DOM</h3>
      <p>Highlight all elements</p>
      <button onclick="highlightAll()">Highlight Elements</button>
    </div>
    
    <div class="tool">
      <h3>CSS Grid Viewer</h3>
      <p>Visualize CSS Grid</p>
      <button onclick="showGridOverlay()">Show Grid</button>
    </div>
    
    <div class="tool">
      <h3>Network Monitor</h3>
      <p>Live network requests</p>
      <button onclick="toggleNetworkMonitor()">Network Monitor</button>
    </div>
    
    <div class="tool">
      <h3>JSON Formatter</h3>
      <p>Format JSON in console</p>
      <button onclick="formatConsoleJSON()">Format JSON</button>
    </div>
    
    <div class="tool">
      <h3>Image Downloader</h3>
      <p>Grab all images</p>
      <button onclick="downloadAllImages()">Download Images</button>
    </div>
  </div>

  <script>
    function launchColorPicker() {
      const picker = document.createElement('div');
      picker.id = 'color-picker';
      picker.innerHTML = `
        <div style="position:fixed;top:20px;left:20px;background:rgba(0,0,0,0.95);padding:20px;border-radius:12px;z-index:999999;border:1px solid #fff">
          <div style="color:white;font-weight:bold;margin-bottom:10px">Color Picker</div>
          <input type="color" id="color-input" style="width:60px;height:40px;border:none;border-radius:6px;cursor:pointer">
          <div id="color-info" style="margin-top:10px;color:#ccc;font-family:monospace;font-size:12px"></div>
          <button onclick="document.getElementById('color-picker').remove()" style="margin-top:10px;padding:8px 16px;background:#fff;color:#000;border:none;border-radius:6px;cursor:pointer">Close</button>
        </div>
      `;
      document.body.appendChild(picker);
      
      const input = document.getElementById('color-input');
      const info = document.getElementById('color-info');
      
      input.addEventListener('input', (e) => {
        info.textContent = `RGB: ${hexToRgb(e.target.value)}`;
        document.body.style.background = e.target.value;
      });
      
      function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? `${parseInt(result[1],16)}, ${parseInt(result[2],16)}, ${parseInt(result[3],16)}` : null;
      }
    }
    
    function highlightAll() {
      Array.from(document.querySelectorAll('*')).forEach((el, i) => {
        setTimeout(() => {
          el.style.outline = `2px solid hsl(${Math.random()*360}, 70%, 50%)`;
          el.style.outlineOffset = '2px';
        }, i * 10);
      });
    }
    
    function showGridOverlay() {
      const grid = document.createElement('div');
      grid.id = 'css-grid-viewer';
      grid.style.cssText = `
        position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;
        background-image:linear-gradient(rgba(0,255,0,0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,0,0.1) 1px, transparent 1px);
        background-size:20px 20px;z-index:99999;
      `;
      document.body.appendChild(grid);
      setTimeout(() => grid.remove(), 5000);
    }
    
    function toggleNetworkMonitor() {
      console.table(performance.getEntriesByType('resource'));
      console.log('%cNetwork requests logged above', 'font-size:20px;color:lime');
    }
    
    function formatConsoleJSON() {
      const json = prompt('Paste JSON here:');
      if (json) {
        try {
          const formatted = JSON.stringify(JSON.parse(json), null, 2);
          console.clear();
          console.log('%cFormatted JSON:', 'font-size:18px;color:lime');
          console.log(formatted);
        } catch(e) {
          alert('Invalid JSON');
        }
      }
    }
    
    function downloadAllImages() {
      const images = Array.from(document.images);
      images.forEach((img, i) => {
        setTimeout(() => {
          const a = document.createElement('a');
          a.href = img.src;
          a.download = `image-${i}.jpg`;
          a.click();
        }, i * 100);
      });
      alert(`${images.length} images queued for download`);
    }
  </script>
</body>
</html>
